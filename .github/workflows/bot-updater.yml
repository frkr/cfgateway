name: Bot Updater

on:
  schedule:
    - cron: '0 0 * * *' # Daily at midnight
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install

      - name: Update packages
        run: pnpm update --latest

      - name: Run tests
        run: pnpm test

      - name: Run typecheck
        run: pnpm run typecheck

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: 'chore: update dependencies'
          title: 'chore: update dependencies'
          body: |
            Automatic update of dependencies.
            All tests and typechecks passed.
          branch: bot-dependency-updates
          delete-branch: true

  security-check:
    runs-on: ubuntu-latest
    needs: update
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Review and merge security PRs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          prs=$(gh pr list --label "dependencies" --label "security" --state open --json number,title)
          if [ "$prs" != "[]" ]; then
            for row in $(echo "${prs}" | jq -r '.[] | @base64'); do
              _jq() {
                echo ${row} | base64 --decode | jq -r ${1}
              }
              number=$(_jq '.number')
              title=$(_jq '.title')
              echo "Reviewing security PR #${number}: ${title}"

              # Check if PR is passing checks
              status=$(gh pr view $number --json mergeable,reviewDecision,statusCheckRollup -q '.statusCheckRollup[].status' | uniq)
              conclusion=$(gh pr view $number --json mergeable,reviewDecision,statusCheckRollup -q '.statusCheckRollup[].conclusion' | uniq)

              if [ "$conclusion" == "SUCCESS" ]; then
                echo "PR #${number} checks passed, merging..."
                gh pr merge $number --auto --merge
              else
                echo "PR #${number} checks not passed or still running. Skipping."
              fi
            done
          else
            echo "No security PRs to merge."
          fi
